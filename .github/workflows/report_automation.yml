name: Satria Data Report Automation

on:
  workflow_dispatch:
    inputs:
      period:
        description: 'Report Period (e.g. Mei 2026)'
        required: true
        default: 'Mei 2026'
        type: string
      use_benefit:
        description: 'Use Benefit Dashboard instead of Query Result'
        required: false
        default: false
        type: boolean
      manual_policies:
        description: 'Comma-separated policy numbers (optional, leave blank for all)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run — upload & sheet update run, but no emails are sent'
        required: false
        default: false
        type: boolean


jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write OAuth credentials
        run: |
          echo '${{ secrets.OAUTH_CLIENT_SECRET_JSON }}' > "${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}"
          echo '${{ secrets.TOKEN_JSON }}' > token.json

      - name: Run pipeline
        env:
          PYTHONIOENCODING: utf-8
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_USER: ${{ secrets.METABASE_USER }}
          METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
          METABASE_CR_CARD_ID: ${{ secrets.METABASE_CR_CARD_ID }}
          METABASE_QUERY_CARD_ID: ${{ secrets.METABASE_QUERY_CARD_ID }}
          METABASE_BENEFIT_CARD_ID: ${{ secrets.METABASE_BENEFIT_CARD_ID }}
          METABASE_ACTIVE_POLICY_CARD_ID: ${{ secrets.METABASE_ACTIVE_POLICY_CARD_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          MASTER_SPREADSHEET_ID: ${{ secrets.MASTER_SPREADSHEET_ID }}
          MASTER_SHEET_NAME: ${{ secrets.MASTER_SHEET_NAME }}
        run: |
          ARGS="--period '${{ github.event.inputs.period }}' --yes"

          if [ "${{ github.event.inputs.use_benefit }}" == "true" ]; then
            ARGS="$ARGS --benefit"
          fi
          if [ -n "${{ github.event.inputs.manual_policies }}" ]; then
            ARGS="$ARGS --policy '${{ github.event.inputs.manual_policies }}'"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running: python3 script/main.py $ARGS"
          eval "python3 script/main.py $ARGS"
