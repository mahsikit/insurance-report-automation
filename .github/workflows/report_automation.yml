name: Satria Data Report Automation

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      period:
        description: 'Report Period (e.g. Februari 2026)'
        required: true
        default: 'Februari 2026'
      use_benefit:
        description: 'Use Benefit Dashboard instead of Query Result'
        required: false
        default: 'false'
      manual_policies:
        description: 'Comma-separated manual policies (optional)'
        required: false
        default: ''

jobs:
  run-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Service Account JSON
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run Script
        env:
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_USER: ${{ secrets.METABASE_USER }}
          METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
          METABASE_CR_CARD_ID: ${{ secrets.METABASE_CR_CARD_ID }}
          METABASE_QUERY_CARD_ID: ${{ secrets.METABASE_QUERY_CARD_ID }}
          METABASE_BENEFIT_CARD_ID: ${{ secrets.METABASE_BENEFIT_CARD_ID }}
          METABASE_ACTIVE_POLICY_CARD_ID: ${{ secrets.METABASE_ACTIVE_POLICY_CARD_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # Read parameters from Gitea UI
          PERIOD="${{ inputs.period }}"
          USE_BENEFIT="${{ inputs.use_benefit }}"
          MANUAL_POLICIES="${{ inputs.manual_policies }}"
          
          ARGS="--period '$PERIOD'"
          if [ "$USE_BENEFIT" == "true" ]; then
            ARGS="$ARGS --benefit"
          fi
          if [ -n "$MANUAL_POLICIES" ]; then
            ARGS="$ARGS --policy '$MANUAL_POLICIES'"
          fi
          
          echo "Running with arguments: $ARGS"
          eval "python script/main.py $ARGS"
