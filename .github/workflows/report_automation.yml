name: Satria Data Report Automation

on:
  workflow_dispatch:
    inputs:
      period:
        description: 'Report Period (e.g. Februari 2026)'
        required: true
        default: 'Februari 2026'
        type: string
      use_benefit:
        description: 'Use Benefit Dashboard instead of Query Result'
        required: false
        default: false
        type: boolean
      manual_policies:
        description: 'Comma-separated manual policies (optional)'
        required: false
        type: string

jobs:
  run-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Service Account JSON
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run Script
        env:
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_USER: ${{ secrets.METABASE_USER }}
          METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
          METABASE_CR_CARD_ID: ${{ secrets.METABASE_CR_CARD_ID }}
          METABASE_QUERY_CARD_ID: ${{ secrets.METABASE_QUERY_CARD_ID }}
          METABASE_BENEFIT_CARD_ID: ${{ secrets.METABASE_BENEFIT_CARD_ID }}
          METABASE_ACTIVE_POLICY_CARD_ID: ${{ secrets.METABASE_ACTIVE_POLICY_CARD_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # Build arguments
          ARGS="--period '${{ inputs.period }}'"
          
          if [ "${{ inputs.use_benefit }}" == "true" ]; then
            ARGS="$ARGS --benefit"
          fi
          
          if [ -n "${{ inputs.manual_policies }}" ]; then
            ARGS="$ARGS --policy '${{ inputs.manual_policies }}'"
          fi
          
          echo "Running with arguments: $ARGS"
          eval "python script/main.py $ARGS"
