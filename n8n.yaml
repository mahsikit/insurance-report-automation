services:
  postgres:
    image: postgres:16
    container_name: n8n-postgres
    restart: always
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=@5uperuser26
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.14.2
    restart: always
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_SCHEMA=public
      - DB_POSTGRESDB_PASSWORD=@5uperuser26
      - N8N_SECURE_COOKIE=false
      - N8N_MAX_PAYLOAD_SIZE=50
      - WEBHOOK_URL=http://192.168.0.75:5678
      - GENERIC_TIMEZONE=Asia/Bangkok
      - N8N_PROXY_HOPS=1
      - QUEUE_BULL_REDIS_HOST=
      - QUEUE_HEALTH_CHECK_ACTIVE=true
      - QUEUE_BULL_REDIS_DB=0
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=@5uperuser26
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_STDLIB_ALLOW=*
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=1000
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  task-runners:
    image: custom-n8n-runner:2.7.4-python
    container_name: n8n-runners
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=@5uperuser26
      - N8N_RUNNERS_STDLIB_ALLOW=*
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=1000
    depends_on:
      - n8n

volumes:
  n8n_data:
  postgres_data:
